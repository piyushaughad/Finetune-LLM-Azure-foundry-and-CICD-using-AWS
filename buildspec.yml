version: 0.2

env:
  variables:
    # Set this in your CodeBuild project environment variables:
    S3_BUCKET_NAME: "react-app-cicd1996"
  # Uncomment to pull secrets from SSM Parameter Store:
  # parameter-store:
  #   AZURE_OPENAI_ENDPOINT: /myapp/AZURE_OPENAI_ENDPOINT

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing Node.js dependencies...
      - npm ci --legacy-peer-deps

  build:
    commands:
      - echo Building the Vite React app...
      - npm run build
      - echo Build output directory contents:
      - ls dist/

  post_build:
    commands:
      - echo Deploying to S3 bucket $S3_BUCKET_NAME...
      - |
        aws s3 sync dist/ s3://$S3_BUCKET_NAME/ \
          --delete \
          --cache-control "max-age=31536000,public" \
          --exclude "index.html"
      - |
        aws s3 cp dist/index.html s3://$S3_BUCKET_NAME/index.html \
          --cache-control "no-cache,no-store,must-revalidate" \
          --content-type "text/html"
      - echo Deployment complete!
      # Uncomment below if you have a CloudFront distribution:
      # - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID --paths "/*"

artifacts:
  files:
    - '**/*'
  base-directory: dist
  discard-paths: no

cache:
  paths:
    - '/root/.npm/**/*'
