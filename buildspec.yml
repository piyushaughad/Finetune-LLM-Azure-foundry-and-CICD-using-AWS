version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing Node.js dependencies...
      - npm ci --legacy-peer-deps

  build:
    commands:
      - echo Building the Vite React app...
      - npm run build
      - echo Build output directory listing && ls dist/

  post_build:
    commands:
      - echo Build complete. CodePipeline will deploy dist/ to S3.

artifacts:
  files:
    - '**/*'
  base-directory: dist
  discard-paths: no

cache:
  paths:
    - '/root/.npm/**/*'
